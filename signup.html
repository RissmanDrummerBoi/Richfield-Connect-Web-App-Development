<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Richfield Connect | Sign Up</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <header>
        <div class="logo-container">
            <h1>Richfield<span>Connect</span></h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="signup.html" class="active">Sign Up</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="feed.html">Feed</a></li>
            </ul>
        </nav>
    </header>

    <main class="signup-main">
        <div class="signup-container">
            <div class="signup-form-wrapper">
                <h2>Create Your Account</h2>
                <form id="registrationForm">
                    <div class="form-group">
                        <label for="fullName">Full Name *</label>
                        <input type="text" id="fullName" name="fullName" required>
                        <div class="error-message" id="fullNameError"></div>
                    </div>

                    <div class="form-group">
                        <label for="studentNumber">Student Number *</label>
                        <input type="text" id="studentNumber" name="studentNumber" required>
                        <div class="error-message" id="studentNumberError"></div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" required>
                        <div class="error-message" id="emailError"></div>
                    </div>

                    <div class="form-group">
                        <label for="campus">Campus / DL *</label>
                        <select id="campus" name="campus" required>
                            <option value="">Select Campus</option>
                            <option value="Durban">Durban</option>
                            <option value="Johannesburg">Johannesburg</option>
                            <option value="Pretoria">Pretoria</option>
                            <option value="Cape Town">Cape Town</option>
                            <option value="Distance Learning">Distance Learning</option>
                        </select>
                        <div class="error-message" id="campusError"></div>
                    </div>

                    <div class="form-group">
                        <label for="bio">Bio</label>
                        <textarea id="bio" name="bio" rows="3" placeholder="Tell us about yourself..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="interests">Interests (comma-separated)</label>
                        <input type="text" id="interests" name="interests" placeholder="e.g., Web Dev, AI, Sports">
                    </div>

                    <div class="form-group">
                        <label for="password">Password * (min 8 characters)</label>
                        <input type="password" id="password" name="password" required>
                        <div class="error-message" id="passwordError"></div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password *</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                        <div class="error-message" id="confirmPasswordError"></div>
                    </div>

                    <button type="submit" class="btn-primary">Register</button>
                </form>
            </div>

            <div class="live-preview-wrapper">
                <h3>Live Profile Preview</h3>
                <div class="profile-preview-card">
                    <div class="preview-name" id="previewName">Your Name</div>
                    <div class="preview-bio" id="previewBio">Your bio will appear here...</div>
                    <div class="preview-interests">
                        <span class="preview-label">Interests:</span>
                        <div class="interest-tags" id="previewInterests"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 Richfield Connect | Empowering Student Collaboration</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
