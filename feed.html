<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Richfield Connect | Feed</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <header>
        <div class="logo-container">
            <h1>Richfield<span>Connect</span></h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="signup.html">Sign Up</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="feed.html" class="active">Feed</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="feed-section">
            <h2>Community Feed</h2>
            
            <div class="create-post-card">
                <h3>Create a Post</h3>
                <textarea id="postContent" rows="3" placeholder="What's on your mind, student?"></textarea>
                <button id="postBtn" class="btn-primary">Post</button>
            </div>

            <div class="feed-container" id="feedContainer">
                <div class="feed-loading">Loading posts...</div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Richfield Connect | Empowering Student Collaboration</p>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/feed.js"></script>
</body>
</html>
